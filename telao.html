<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Cronômetro - Câmara Municipal de Ubá
</title>

<link
rel="icon"
type="image/png"
href="Brasao_Uba.png">

<style>

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    font-family: Arial, sans-serif;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
    position: relative;
}

body.tela-simples-mode::before{
    opacity: 0.50;
}
body::before{
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('Brasao_Uba.png') center center no-repeat;
    background-size: contain;
    opacity: 0.5;
    z-index: 0;
    pointer-events: none;
}

.container-telao,
.relogio-telao{
    position: relative;
    z-index: 1;
}

.container-telao{
    text-align:center;
    width:100%;
    padding:10px 40px;
    display:flex;
    flex-direction:column;
    min-height:100vh;
}
.espacador-telao{
    flex:0.5;
}
.titulo-sessao-telao{
    font-size: 70px;
    font-weight: bold;
    color: #fff;
    margin-bottom: -40px;
	text-decoration: underline;
text-decoration-thickness: 1px;
}

.status-telao{
    font-size: 50px;
    font-weight: bold;
    color: #fff;
    margin-bottom: 30px;
}

.orador-atual-telao{
    font-size:clamp(40px,3vw,60px);
    font-weight:bold;
    color:#fff;
    text-transform:uppercase;
    line-height:1.2;
    min-height:100px;
    margin-bottom: 20px;
    text-align:center;
	  overflow:hidden;
}

.orador-atual-telao .replica-subtitle{
    display: block;
    font-size: 32px;
    font-weight: normal;
    color: #fff;
    margin-top: 6px;
}

.cronometro-telao{
    font-size: 180px;
    font-weight: bold;
    color: #0787d9;
    margin-bottom:50px;
    font-family: Arial, sans-serif;
	text-shadow:
    -1px -1px 0 #000,
     3px -1px 0 #000,
    -1px  1px 0 #000,
     1px  1px 0 #000;
}

.proximo-orador-telao{
    font-size: 36px;
    color: #fff;
    margin-top: 20px;
}

.relogio-telao{
    position: fixed;
    bottom: 15px;
    right: 15px;
    font-size: 30px;
    color: #fff;
    text-align: right;
    line-height: 1.4;
    z-index: 999;
}

@keyframes piscarFinal {
    0% {
        opacity: 1;
    }
    50% {
        opacity: 0.2;
    }
    100% {
        opacity: 1;
    }
}

.cronometroPiscando{
    animation: piscarFinal 1s infinite;
}
</style>


</head>

<body>
   
    

<div class="relogio-telao" id="relogioTelao"></div>

<div class="container-telao">

    <div class="titulo-sessao-telao" id="tituloSessaoTelao">
        CONSIDERAÇÕES FINAIS
    </div>
	<div class="espacador-telao"></div>

    <div id="conteudoNormalTelao">

        <div class="status-telao">
            USANDO A PALAVRA:
        </div>

        <div class="orador-atual-telao" id="oradorAtualTelao">
            AGUARDANDO INÍCIO
        </div>

        <div class="cronometro-telao" id="cronometroTelao">
            
        </div>

        <div class="proximo-orador-telao" id="proximoOradorTelao">
            Próximo Orador: ---
        </div>

    </div>

    <!-- Conteúdo da Tela Simples (inicialmente oculto) -->
    <div id="conteudoSimplesTelao" style="display:none;">

        <div style="font-size:120px;font-weight:bold;color:#fff;margin-bottom:60px;">
            Câmara Municipal de Ubá/MG
        </div>

    </div>

</div>

<script>

// Sincronizar com a aba principal usando localStorage
setInterval(()=>{
    
    try{
        const dados = JSON.parse(localStorage.getItem('estadoCronometro') || '{}');
        const modo = dados.modoSessao || 'consideracoes';
        
        document.getElementById('tituloSessaoTelao').textContent = dados.tituloSessao || 'CONSIDERAÇÕES FINAIS';
        
        // Mostrar/esconder conteúdo da Tela Simples
        const normalContent = document.getElementById('conteudoNormalTelao');
        const simpleContent = document.getElementById('conteudoSimplesTelao');
        const bodyEl = document.body;
        
        if(modo === 'tela_simples'){
            normalContent.style.display = 'none';
            simpleContent.style.display = 'block';
            bodyEl.classList.add('tela-simples-mode');
            document.getElementById('tituloSessaoTelao').style.display = 'none';
        } else {
            normalContent.style.display = 'block';
            simpleContent.style.display = 'none';
            bodyEl.classList.remove('tela-simples-mode');
            document.getElementById('tituloSessaoTelao').style.display = '';
        }
        
        const oradorAtualEl = document.getElementById('oradorAtualTelao');
        const oradorTexto = dados.oradorAtual || 'AGUARDANDO INÍCIO';
        const replicaMatch = oradorTexto.match(/^(.+)\s*\(RÉPLICA DE\s*(.+)\)$/i);
        if(replicaMatch){
            oradorAtualEl.innerHTML = replicaMatch[1] + '<span class="replica-subtitle">RÉPLICA DE ' + replicaMatch[2] + '</span>';
        } else {
            oradorAtualEl.textContent = oradorTexto;
        }
        const cronEl = document.getElementById('cronometroTelao');
        cronEl.textContent = dados.cronometro || '05:00';
		const partes = cronEl.textContent.split(':');
const segundos = parseInt(partes[0]) * 60 + parseInt(partes[1]);

if(segundos <= 10 && segundos > 0){
    cronEl.classList.add('cronometroPiscando');
}else{
    cronEl.classList.remove('cronometroPiscando');
}
        cronEl.style.color = dados.cronometroCor || '#fff';
        const proximoEl = document.getElementById('proximoOradorTelao');
        if(dados.modoSessao === 'consideracoes'){
            proximoEl.style.display = '';
            proximoEl.textContent = dados.proximoOrador || 'Próximo Orador: ---';
            proximoEl.textContent = dados.proximoOrador || 'Próximo Orador: ---';
        } else {
            proximoEl.style.display = 'none';
        }
        
    } catch(e){
        console.log('Erro ao sincronizar:', e);
    }
    
}, 500);

function atualizarRelogio(){
    const agora = new Date();
    const hh = String(agora.getHours()).padStart(2,'0');
    const mm = String(agora.getMinutes()).padStart(2,'0');
    const ss = String(agora.getSeconds()).padStart(2,'0');
    const dd = String(agora.getDate()).padStart(2,'0');
    const mo = String(agora.getMonth()+1).padStart(2,'0');
    const yy = String(agora.getFullYear()).slice(-2);
    document.getElementById('relogioTelao').innerHTML = hh+':'+mm+':'+ss+'<br>'+dd+'/'+mo+'/'+yy;
}
atualizarRelogio();
setInterval(atualizarRelogio, 1000);

</script>

</body>

</html>
