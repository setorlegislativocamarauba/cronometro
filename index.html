<!DOCTYPE html>
<html lang="pt-BR">

<head>


<meta charset="UTF-8">

<!--
Sistema desenvolvido por Diones Ferreira de Almeida, servidor da Câmara Municipal de Ubá/MG.

Este projeto foi concebido com o objetivo de modernizar e padronizar o controle de tempo utilizado durante as sessões plenárias, proporcionando maior eficiência, confiabilidade e profissionalismo aos trabalhos legislativos.

O desenvolvimento foi realizado utilizando o Visual Studio Code, com suporte de ferramentas de inteligência artificial aplicadas ao processo de programação.

A utilização, adaptação e distribuição deste sistema são permitidas para câmaras municipais e demais órgãos públicos interessados. É vedada sua comercialização, total ou parcial.
-->


<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Controle de Uso da Palavra
</title>

<link
rel="icon"
type="image/png"
href="Brasao_Uba.png">

<link
rel="stylesheet"
href="controle.css">

</head>

<body>


<!-- MODOS -->

<div class="modosSessao">

    <button id="modoTelaSimples">
        🖼 Tela Simples
    </button>

    <button id="modoDiscussao">
        📄 Discussão de Proposições
    </button>

    <button id="modoConsideracoes">
        🎤 Considerações Finais
    </button>

    <button id="modoTribuna">
        🏛 Tribuna Livre
    </button>

    <button id="modoCondolencias">
        🙏🏻 Condolências
    </button>

    <button id="modoPausa">
        ⏸ Pausa da Reunião
    </button>

</div>

<div id="tituloSessao">
    CONSIDERAÇÕES FINAIS
</div>

<!-- CONTAINER PRINCIPAL -->

<div class="container">

    <!-- COLUNA 1 -->

    <div
    class="coluna colunaEsquerda">

        <div
        class="painel"
        id="painelEsquerdo">

        </div>

    </div>

    <!-- COLUNA 2 -->

    <div
    class="coluna colunaCentro">

        <div
        class="painel"
        id="painelCentro">

        </div>

    </div>

    <!-- COLUNA 3 -->

    <div
    class="colunaPrincipal">

        <div
        class="painelPrincipal">

            <div
            class="tituloStatus">

                USANDO A PALAVRA

            </div>

            <div class="areaOrador">
    <div id="oradorAtual">AGUARDANDO INÍCIO</div>
</div>

            </div>

            <div id="proximoOrador">

            <div id="mensagemTempo"></div>

            <div id="historicoInfo"></div>

            <div class="opcoes">

                <button id="btnAlarme" style="background:#ff6f00;">
                    🟠 Alarme ligado
                </button>

                <button id="btnTempoExtra" style="background:#ff6f00;">
                    🟠 Tempo extra ligado
                </button>

            </div>

            <div class="acoes">

                <button id="btnIniciar">
                    ▶ Iniciar
                </button>

                <button id="btnPausar">
                    ⏸ Pausar
                </button>

                <button id="btnEncerrar">

                </button>

                <button id="btnProximo">

                </button>

                <button id="btnRetornar">
                    ⏮ Retornar
                </button>

                <button id="btnRestaurar">
                    ↺ Restaurar
                </button>

                <button id="btnTelao">
                    🖥 Telão
                </button>

            </div>

        </div>

    </div>

</div>
